<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>YogTeck — Smart Rack Solutions for Modern Retail Spaces</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="YogTeck designs and installs premium wall, garment, gondola and heavy-duty retail rack solutions for malls, supermarkets and showrooms. A company of Yogkart Healthcare Private Limited.">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script>
    (function(){
      try{
        var saved = localStorage.getItem('yogteck-theme');
        if(saved === 'light'){
          document.documentElement.setAttribute('data-theme','light');
        } else if(saved !== 'dark' && window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches){
          document.documentElement.setAttribute('data-theme','light');
        }
      }catch(e){}
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
